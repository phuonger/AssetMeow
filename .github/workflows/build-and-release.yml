name: Build & Release AssetMeow

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v2.1.0

permissions:
  contents: write

env:
  SCHEME: AssetMeow
  PROJECT: AssetMeow.xcodeproj

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Install certificate
      env:
        CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
        CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
      run: |
        # Create a temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
        
        # Create keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        # Import certificate
        echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
        security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH
        
        # Verify certificate is available and show identity
        security find-identity -v -p codesigning $KEYCHAIN_PATH

    - name: Resolve Swift packages
      run: xcodebuild -resolvePackageDependencies -project $PROJECT -scheme $SCHEME

    - name: Build archive
      env:
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        xcodebuild archive \
          -project $PROJECT \
          -scheme $SCHEME \
          -configuration Release \
          -archivePath build/AssetMeow.xcarchive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Developer ID Application" \
          DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
          OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
          ONLY_ACTIVE_ARCH=NO

    - name: Export and deep-sign app
      run: |
        mkdir -p build/export
        cp -R build/AssetMeow.xcarchive/Products/Applications/AssetMeow.app build/export/
        
        APP_PATH="build/export/AssetMeow.app"
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        IDENTITY="Developer ID Application"
        
        # Find and re-sign all Sparkle XPC services and helpers with hardened runtime
        # Sign XPC services
        find "$APP_PATH" -name "*.xpc" -print0 | while IFS= read -r -d '' xpc; do
          echo "Signing XPC: $xpc"
          codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime "$xpc"
        done
        
        # Sign Autoupdate helper
        if [ -f "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate" ]; then
          echo "Signing Autoupdate"
          codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"
        fi
        
        # Sign Updater.app
        if [ -d "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app" ]; then
          echo "Signing Updater.app"
          codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"
        fi
        
        # Sign Sparkle framework itself
        if [ -d "$APP_PATH/Contents/Frameworks/Sparkle.framework" ]; then
          echo "Signing Sparkle.framework"
          codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime "$APP_PATH/Contents/Frameworks/Sparkle.framework"
        fi
        
        # Re-sign the main app bundle (must be last)
        echo "Signing main app"
        codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime --entitlements AssetMeow/AssetMeow.entitlements "$APP_PATH"

    - name: Verify code signature
      run: |
        codesign --verify --deep --strict build/export/AssetMeow.app
        codesign -dv --verbose=4 build/export/AssetMeow.app
        echo "--- Checking all code signatures ---"
        codesign --verify --deep --strict --verbose=2 build/export/AssetMeow.app

    - name: Create ZIP for notarization
      run: |
        cd build/export
        zip -r ../AssetMeow.zip AssetMeow.app
        cd ../..

    - name: Notarize app
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        # Submit for notarization and capture the submission ID
        SUBMIT_OUTPUT=$(xcrun notarytool submit build/AssetMeow.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait --timeout 10m 2>&1) || true
        
        echo "$SUBMIT_OUTPUT"
        
        # Extract submission ID
        SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
        
        # Check if notarization succeeded
        if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
          echo "Notarization succeeded!"
        else
          echo "Notarization failed. Fetching log..."
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true
          exit 1
        fi
        
        # Staple the notarization ticket to the app
        xcrun stapler staple build/export/AssetMeow.app
        
        # Verify stapling
        xcrun stapler validate build/export/AssetMeow.app

    - name: Create DMG
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        # Create a temporary directory for DMG contents
        mkdir -p build/dmg_contents
        cp -R build/export/AssetMeow.app build/dmg_contents/
        ln -s /Applications build/dmg_contents/Applications
        
        # Create DMG
        hdiutil create -volname "AssetMeow" \
          -srcfolder build/dmg_contents \
          -ov -format UDZO \
          build/AssetMeow.dmg
        
        # Sign the DMG
        codesign --sign "Developer ID Application" --keychain $RUNNER_TEMP/app-signing.keychain-db build/AssetMeow.dmg
        
        # Notarize the DMG
        xcrun notarytool submit build/AssetMeow.dmg \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait --timeout 10m
        
        # Staple the DMG
        xcrun stapler staple build/AssetMeow.dmg

    - name: Create final ZIP for Sparkle (with stapled notarization)
      run: |
        # Re-create ZIP with the stapled (notarized) app
        rm -f build/AssetMeow.zip
        cd build/export
        zip -r ../AssetMeow.zip AssetMeow.app
        cd ../..

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Generate appcast entry
      run: |
        ZIP_SIZE=$(stat -f%z build/AssetMeow.zip)
        VERSION=${{ steps.version.outputs.VERSION }}
        TAG=${GITHUB_REF#refs/tags/}
        DATE=$(date -R)
        
        cat > build/appcast.xml << EOF
        <?xml version="1.0" encoding="utf-8"?>
        <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
          <channel>
            <title>AssetMeow Updates</title>
            <link>https://raw.githubusercontent.com/phuonger/AssetMeow/main/appcast.xml</link>
            <description>Most recent changes with links to updates.</description>
            <language>en</language>
            <item>
              <title>Version ${VERSION}</title>
              <pubDate>${DATE}</pubDate>
              <sparkle:version>${VERSION}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
              <enclosure url="https://github.com/phuonger/AssetMeow/releases/download/${TAG}/AssetMeow.zip"
                         sparkle:version="${VERSION}"
                         sparkle:shortVersionString="${VERSION}"
                         length="${ZIP_SIZE}"
                         type="application/octet-stream" />
            </item>
          </channel>
        </rss>
        EOF

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AssetMeow-${{ steps.version.outputs.VERSION }}
        path: |
          build/AssetMeow.dmg
          build/AssetMeow.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: AssetMeow v${{ steps.version.outputs.VERSION }}
        body: |
          ## AssetMeow v${{ steps.version.outputs.VERSION }}
          
          ### Installation
          - Download `AssetMeow.dmg` and drag to Applications
          - Existing users will receive this update automatically via in-app updater
          - This build is **signed and notarized** — no Gatekeeper warnings
          
          ### Changes
          See commit history for details.
        files: |
          build/AssetMeow.dmg
          build/AssetMeow.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update appcast.xml in repo
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git fetch origin main
        git checkout main
        cp build/appcast.xml appcast.xml
        git add appcast.xml
        git commit -m "Update appcast.xml for v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup keychain
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
