name: Build & Release AssetMeow

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v2.1.0

permissions:
  contents: write

env:
  SCHEME: AssetMeow
  PROJECT: AssetMeow.xcodeproj

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Install certificate
      env:
        CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
        CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
      run: |
        # Create a temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
        
        # Create keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        # Import certificate
        echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
        security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH
        
        # Verify certificate is available
        security find-identity -v -p codesigning $KEYCHAIN_PATH
        
        # Store keychain path for later steps
        echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

    - name: Resolve Swift packages
      run: xcodebuild -resolvePackageDependencies -project $PROJECT -scheme $SCHEME

    - name: Build app
      env:
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        xcodebuild build \
          -project $PROJECT \
          -scheme $SCHEME \
          -configuration Release \
          -derivedDataPath build/DerivedData \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Developer ID Application" \
          DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
          OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
          ONLY_ACTIVE_ARCH=NO

    - name: Locate and prepare app
      run: |
        # Find the built app
        APP_PATH=$(find build/DerivedData -name "AssetMeow.app" -path "*/Release/*" | head -1)
        echo "Found app at: $APP_PATH"
        
        # Copy to export directory
        mkdir -p build/export
        cp -R "$APP_PATH" build/export/AssetMeow.app
        
        echo "APP_EXPORT_PATH=build/export/AssetMeow.app" >> $GITHUB_ENV

    - name: Re-sign app with hardened runtime and entitlements
      run: |
        APP="$APP_EXPORT_PATH"
        IDENTITY="Developer ID Application"
        
        # Sign all executables inside frameworks with hardened runtime
        # Sparkle XPC services
        find "$APP/Contents/Frameworks" -name "*.xpc" -type d | while read xpc; do
          echo "Signing XPC: $xpc"
          codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime --timestamp "$xpc"
        done
        
        # Sparkle helpers
        for helper in "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate" \
                      "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"; do
          if [ -e "$helper" ]; then
            echo "Signing: $helper"
            codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime --timestamp "$helper"
          fi
        done
        
        # Sign the Sparkle framework
        echo "Signing Sparkle.framework"
        codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime --timestamp "$APP/Contents/Frameworks/Sparkle.framework"
        
        # Sign the main app last with entitlements
        echo "Signing main app with entitlements"
        codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime --timestamp \
          --entitlements AssetMeow/AssetMeow.entitlements "$APP"

    - name: Verify code signature
      run: |
        echo "=== Deep verification ==="
        codesign --verify --deep --strict --verbose=2 "$APP_EXPORT_PATH"
        echo "=== Signature details ==="
        codesign -dv --verbose=4 "$APP_EXPORT_PATH"
        echo "=== Gatekeeper assessment ==="
        spctl --assess --type execute --verbose=2 "$APP_EXPORT_PATH" || echo "spctl check done (may fail without notarization)"

    - name: Create ZIP for notarization
      run: |
        /usr/bin/ditto -c -k --keepParent "$APP_EXPORT_PATH" build/AssetMeow.zip

    - name: Notarize app
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        # Submit for notarization
        SUBMIT_OUTPUT=$(xcrun notarytool submit build/AssetMeow.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait --timeout 10m 2>&1) || true
        
        echo "$SUBMIT_OUTPUT"
        
        # Extract submission ID
        SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
        
        # Check if notarization succeeded
        if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
          echo "Notarization succeeded!"
        else
          echo "Notarization failed. Fetching log..."
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true
          exit 1
        fi
        
        # Staple the notarization ticket to the app
        xcrun stapler staple "$APP_EXPORT_PATH"

    - name: Create DMG
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        mkdir -p build/dmg_contents
        cp -R "$APP_EXPORT_PATH" build/dmg_contents/
        ln -s /Applications build/dmg_contents/Applications
        
        hdiutil create -volname "AssetMeow" \
          -srcfolder build/dmg_contents \
          -ov -format UDZO \
          build/AssetMeow.dmg
        
        codesign --sign "Developer ID Application" --keychain "$KEYCHAIN_PATH" --timestamp build/AssetMeow.dmg
        
        xcrun notarytool submit build/AssetMeow.dmg \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait --timeout 10m
        
        xcrun stapler staple build/AssetMeow.dmg

    - name: Create final ZIP for Sparkle (with stapled app)
      run: |
        rm -f build/AssetMeow.zip
        /usr/bin/ditto -c -k --keepParent "$APP_EXPORT_PATH" build/AssetMeow.zip

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Generate appcast entry
      run: |
        ZIP_SIZE=$(stat -f%z build/AssetMeow.zip)
        VERSION=${{ steps.version.outputs.VERSION }}
        TAG=${GITHUB_REF#refs/tags/}
        DATE=$(date -R)
        
        cat > build/appcast.xml << EOF
        <?xml version="1.0" encoding="utf-8"?>
        <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
          <channel>
            <title>AssetMeow Updates</title>
            <link>https://raw.githubusercontent.com/phuonger/AssetMeow/main/appcast.xml</link>
            <description>Most recent changes with links to updates.</description>
            <language>en</language>
            <item>
              <title>Version ${VERSION}</title>
              <pubDate>${DATE}</pubDate>
              <sparkle:version>${VERSION}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
              <enclosure url="https://github.com/phuonger/AssetMeow/releases/download/${TAG}/AssetMeow.zip"
                         sparkle:version="${VERSION}"
                         sparkle:shortVersionString="${VERSION}"
                         length="${ZIP_SIZE}"
                         type="application/octet-stream" />
            </item>
          </channel>
        </rss>
        EOF

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AssetMeow-${{ steps.version.outputs.VERSION }}
        path: |
          build/AssetMeow.dmg
          build/AssetMeow.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: AssetMeow v${{ steps.version.outputs.VERSION }}
        body: |
          ## AssetMeow v${{ steps.version.outputs.VERSION }}
          
          ### Installation
          - Download `AssetMeow.dmg` and drag to Applications
          - Existing users will receive this update automatically via in-app updater
          - This build is **signed and notarized** — no Gatekeeper warnings
          
          ### Changes
          See commit history for details.
        files: |
          build/AssetMeow.dmg
          build/AssetMeow.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update appcast.xml in repo
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git fetch origin main
        git checkout main
        cp build/appcast.xml appcast.xml
        git add appcast.xml
        git commit -m "Update appcast.xml for v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup keychain
      if: always()
      run: |
        security delete-keychain $KEYCHAIN_PATH || true
